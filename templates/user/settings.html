{% extends "base.html" %}

{% block title %}Account Settings - Eventful Planner{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10 animate-fade-in-down">
    
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-extrabold text-slate-900 flex items-center gap-3">
            <i class="fas fa-cog text-indigo-500"></i> Account Settings
        </h1>
        <a href="{{ url_for('user.dashboard') }}" class="text-slate-500 hover:text-indigo-600 transition-colors font-medium">
            <i class="fas fa-arrow-left mr-1"></i> Back to Dashboard
        </a>
    </div>

    <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden relative">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-500 to-indigo-500"></div>
        
        <form action="{{ url_for('user.settings') }}" method="POST" class="p-8 md:p-10 space-y-8">
            
            <div>
                <h3 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2">Profile Information</h3>
                <div class="space-y-6">
                    <!-- Email (Disabled) -->
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="email" value="{{ current_user.email }}" disabled class="block w-full bg-slate-100 border border-slate-200 rounded-xl shadow-sm py-3 pl-11 pr-4 text-slate-500 cursor-not-allowed">
                        </div>
                        <p class="text-xs text-slate-500 mt-2">Your email address cannot be changed at this time.</p>
                    </div>

                    <!-- Name -->
                    <div>
                        <label for="name" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Display Name</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="text" name="name" id="name" value="{{ current_user.name }}" class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900">
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <h3 class="text-lg font-bold text-slate-900 mb-4 border-b border-slate-100 pb-2 mt-8">Change Password</h3>
                <div class="space-y-6">
                    <!-- New Password -->
                    <div>
                        <label for="new_password" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">New Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="password" name="new_password" id="new_password" class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900" placeholder="Leave blank to keep current password">
                        </div>
                    </div>
                    
                    <!-- Confirm Password -->
                    <div>
                        <label for="confirm_password" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Confirm New Password</label>
                        <div class="relative">
                            <i class="fas fa-check-circle absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="password" name="confirm_password" id="confirm_password" class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900" placeholder="Confirm your new password">
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 flex justify-end gap-4">
                <a href="{{ url_for('user.dashboard') }}" class="px-6 py-3 border border-slate-200 rounded-full text-slate-600 font-bold hover:bg-slate-50 transition-colors shadow-sm">
                    Cancel
                </a>
                <button type="submit" class="px-8 py-3 bg-gradient-to-r from-pink-500 to-indigo-500 hover:from-pink-600 hover:to-indigo-600 text-white font-bold rounded-full shadow-lg shadow-indigo-200 transition-all hover:-translate-y-0.5">
                    Save Changes <i class="fas fa-check ml-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

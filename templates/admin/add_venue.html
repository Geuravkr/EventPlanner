{% extends "base.html" %}

{% block title %}Add New Venue - Admin Dashboard{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 animate-fade-in-down">
    
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-3xl font-extrabold text-slate-900 flex items-center gap-3">
            <i class="fas fa-plus-circle text-indigo-500"></i> Add New Venue
        </h1>
        <a href="{{ url_for('admin.dashboard') }}" class="text-slate-500 hover:text-indigo-600 transition-colors font-medium">
            <i class="fas fa-arrow-left mr-1"></i> Back to Dashboard
        </a>
    </div>

    <div class="bg-white rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden relative">
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-pink-500 to-indigo-500"></div>
        
        <form action="{{ url_for('admin.add_venue') }}" method="POST" class="p-8 md:p-10 space-y-8">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Name -->
                <div class="md:col-span-2">
                    <label for="name" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Venue Name</label>
                    <input type="text" name="name" id="name" required class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900" placeholder="e.g. Grand Plaza Hotel">
                </div>
                
                <!-- Location -->
                <div class="md:col-span-2">
                    <label for="location" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Location / Address</label>
                    <div class="relative">
                        <i class="fas fa-map-marker-alt absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="text" name="location" id="location" required class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900" placeholder="e.g. 123 Luxury Ave, New York">
                    </div>
                </div>

                <!-- Price -->
                <div>
                    <label for="price" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Price per Day ($)</label>
                    <div class="relative">
                        <i class="fas fa-dollar-sign absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="number" name="price" id="price" min="0" step="0.01" required class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900" placeholder="e.g. 2500">
                    </div>
                </div>

                <!-- Capacity -->
                <div>
                    <label for="capacity" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Maximum Capacity</label>
                    <div class="relative">
                        <i class="fas fa-users absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="number" name="capacity" id="capacity" min="1" required class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900" placeholder="e.g. 300">
                    </div>
                </div>
                
                <!-- Image URL -->
                <div class="md:col-span-2">
                    <label for="image_url" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Primary Image URL</label>
                    <div class="relative">
                        <i class="fas fa-image absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                        <input type="url" name="image_url" id="image_url" class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 pl-11 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900" placeholder="e.g. https://images.unsplash.com/photo-...">
                    </div>
                    <p class="text-xs text-slate-500 mt-2"><i class="fas fa-info-circle text-indigo-400"></i> Paste a direct link to an image. Leave blank to use a default placeholder.</p>
                </div>

                <!-- Description -->
                <div class="md:col-span-2">
                    <label for="description" class="block text-sm font-bold text-slate-700 mb-2 uppercase tracking-wide">Description</label>
                    <textarea name="description" id="description" rows="4" class="block w-full bg-slate-50 border border-slate-200 rounded-xl shadow-sm py-3 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:bg-white transition-all text-slate-900" placeholder="Describe the venue's features, amenities, and vibe..."></textarea>
                </div>
            </div>

            <div class="pt-6 border-t border-slate-100 flex justify-end gap-4">
                <a href="{{ url_for('admin.dashboard') }}" class="px-6 py-3 border border-slate-200 rounded-full text-slate-600 font-bold hover:bg-slate-50 transition-colors shadow-sm">
                    Cancel
                </a>
                <button type="submit" class="px-8 py-3 bg-gradient-to-r from-pink-500 to-indigo-500 hover:from-pink-600 hover:to-indigo-600 text-white font-bold rounded-full shadow-lg shadow-indigo-200 transition-all hover:-translate-y-0.5">
                    Save Venue <i class="fas fa-check ml-2"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

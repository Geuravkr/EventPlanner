{% extends "base.html" %}

{% block title %}Sign up - Eventful Planner{% endblock %}

{% block body_class %}bg-gradient-to-br from-indigo-50 to-purple-50{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-200/50 border border-slate-100 relative overflow-hidden animate-fade-in-down">
        
        <!-- Decorative blob -->
        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-gradient-to-br from-indigo-200 to-indigo-100 opacity-50 blur-2xl"></div>
        <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-32 h-32 rounded-full bg-gradient-to-tr from-pink-200 to-pink-100 opacity-50 blur-2xl"></div>

        <div class="relative z-10">
            <div class="text-center">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-pink-500 text-white flex items-center justify-center font-bold text-3xl mx-auto shadow-lg mb-6">
                    <i class="fas fa-user-plus text-xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    Create account
                </h2>
                <p class="mt-2 text-sm text-slate-500">
                    Join us and start planning your perfect events
                </p>
            </div>
            
            <form class="mt-8 space-y-6" action="{{ url_for('auth.register') }}" method="POST">
                <div class="space-y-4">
                    <div>
                        <label for="name" class="sr-only">Full Name</label>
                        <div class="relative">
                            <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input id="name" name="name" type="text" required class="appearance-none relative block w-full px-4 py-4 pl-12 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:z-10 sm:text-sm bg-slate-50 focus:bg-white transition-all" placeholder="Full Name">
                        </div>
                    </div>
                    <div>
                        <label for="email" class="sr-only">Email address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input id="email" name="email" type="email" autocomplete="email" required class="appearance-none relative block w-full px-4 py-4 pl-12 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:z-10 sm:text-sm bg-slate-50 focus:bg-white transition-all" placeholder="Email address">
                        </div>
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input id="password" name="password" type="password" autocomplete="new-password" required class="appearance-none relative block w-full px-4 py-4 pl-12 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-2xl focus:outline-none focus:ring-2 focus:ring-indigo-200 focus:border-indigo-300 focus:z-10 sm:text-sm bg-slate-50 focus:bg-white transition-all" placeholder="Password">
                        </div>
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-full text-white bg-gradient-to-r from-indigo-500 to-pink-500 hover:from-indigo-600 hover:to-pink-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 shadow-lg shadow-indigo-200 hover:-translate-y-0.5 transition-all">
                        Create Account
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">
                    Already have an account? 
                    <a href="{{ url_for('auth.login') }}" class="font-bold text-pink-600 hover:text-indigo-600 transition-colors">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

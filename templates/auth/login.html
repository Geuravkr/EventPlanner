{% extends "base.html" %}

{% block title %}Log in - Eventful Planner{% endblock %}

{% block body_class %}bg-gradient-to-br from-pink-50 to-indigo-50{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2.5rem] shadow-2xl shadow-indigo-200/50 border border-slate-100 relative overflow-hidden animate-fade-in-down">
        
        <!-- Decorative blob -->
        <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-gradient-to-br from-pink-200 to-pink-100 opacity-50 blur-2xl"></div>
        <div class="absolute bottom-0 left-0 -ml-8 -mb-8 w-32 h-32 rounded-full bg-gradient-to-tr from-indigo-200 to-indigo-100 opacity-50 blur-2xl"></div>

        <div class="relative z-10">
            <div class="text-center">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-pink-500 to-indigo-500 text-white flex items-center justify-center font-bold text-3xl mx-auto shadow-lg mb-6">
                    <i class="fas fa-sparkles text-xl"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">
                    Welcome back
                </h2>
                <p class="mt-2 text-sm text-slate-500">
                    Sign in to your account
                </p>
            </div>
            
            <form class="mt-8 space-y-6" action="{{ url_for('auth.login') }}" method="POST">
                <div class="space-y-4">
                    <div>
                        <label for="email" class="sr-only">Email address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input id="email" name="email" type="email" autocomplete="email" required class="appearance-none relative block w-full px-4 py-4 pl-12 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:z-10 sm:text-sm bg-slate-50 focus:bg-white transition-all" placeholder="Email address">
                        </div>
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <div class="relative">
                            <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none relative block w-full px-4 py-4 pl-12 border border-slate-200 placeholder-slate-400 text-slate-900 rounded-2xl focus:outline-none focus:ring-2 focus:ring-pink-200 focus:border-pink-300 focus:z-10 sm:text-sm bg-slate-50 focus:bg-white transition-all" placeholder="Password">
                        </div>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-pink-500 focus:ring-pink-500 border-slate-300 rounded cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-600 cursor-pointer">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-semibold text-indigo-600 hover:text-pink-500 transition-colors">
                            Forgot password?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-full text-white bg-gradient-to-r from-pink-500 to-indigo-500 hover:from-pink-600 hover:to-indigo-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500 shadow-lg shadow-pink-200 hover:-translate-y-0.5 transition-all">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <i class="fas fa-sign-in-alt text-white/50 group-hover:text-white/70 transition-colors"></i>
                        </span>
                        Sign in
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">
                    Don't have an account? 
                    <a href="{{ url_for('auth.register') }}" class="font-bold text-indigo-600 hover:text-pink-500 transition-colors">Sign up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
